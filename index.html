<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon-32x32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="favicon-16x16.png" type="image/png" sizes="16x16">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>ProfilCode</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="matrix"></canvas>

    <div id="main-wrapper">
        <div id="capture" class="code-container">
            <span class="keyword">function</span> <span class="function-name">repeat</span>() {
            <div class="code-body">
                <span class="function-call">eat</span>();<br>
                <span class="function-call">sleep</span>();<br>
                <span class="function-call">code</span>();<br>
                <span class="function-call">repeat</span>();
            </div>
            };
            <div class="signature">//by Dima</div>
        </div>
        <div class="button-wrapper">
            <button onclick="downloadImage()" class="download-btn">Download</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
